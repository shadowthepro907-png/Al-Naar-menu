<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ع النار - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInItem { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-item { animation: fadeIn 0.5s ease-out forwards; }
        .animate-section { animation: slideIn 0.6s ease-out forwards; }
        .menu-item-anim { animation: slideInItem 0.5s ease-out forwards; }
        .order-btn-pulse { animation: pulse-gold 2s infinite; }
        .total-bounce { animation: bounce 2s infinite; }
        body { background-color: #0a0a0a; color: #e5e7eb; }
        .type-btn { transition: all 0.3s ease; }
        .qty-btn { transition: all 0.3s ease; }
        .qty-btn:hover { transform: scale(1.1); }
        .qty-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-48">

<div class="max-w-md mx-auto p-4">
    <h1 class="text-4xl font-black text-center text-red-600 mb-8 tracking-widest animate-fadeIn">ع النار</h1>

    <!-- Order Type -->
    <div class="flex gap-2 mb-6 animate-section">
        <button onclick="setOrderType('Takeaway')" id="btn-Takeaway" class="type-btn flex-1 py-3 rounded-lg border border-red-600 bg-red-900 text-white font-bold">Takeaway</button>
        <button onclick="setOrderType('Delivery')" id="btn-Delivery" class="type-btn flex-1 py-3 rounded-lg border border-gray-700 bg-transparent text-gray-400 font-bold">Delivery</button>
    </div>

    <div id="menu-container" class="space-y-8"></div>
</div>

<!-- Sticky Order Bar -->
<div class="fixed bottom-0 left-0 w-full bg-black border-t border-red-900 p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-50 animate-fadeIn">
    <textarea id="orderComment" placeholder="Special instructions..." class="w-full p-3 text-sm bg-gray-900 border border-gray-700 rounded mb-2 h-16 text-white transition-all duration-300"></textarea>
    <div class="flex justify-between items-center mb-3">
        <span class="text-2xl font-bold text-yellow-500 total-bounce">$<span id="total">0.00</span></span>
        <button onclick="sendWhatsApp()" class="bg-red-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-red-700 transition-all order-btn-pulse">Order Now</button>
    </div>
</div>

<script>
    const menuData = [
        { cat: "Salad & Sides", items: [{n: "Fattouch", p: 5.50}, {n: "Hommos", p: 5.00}, {n: "Box Fries", p: 2.00}, {n: "Fries", p: 4.00}] },
        { cat: "Sandwiches", items: [{n: "Fries", p: 3.00}, {n: "Tawook", p: 6.00}, {n: "Lahme", p: 6.50}, {n: "Ghanam", p: 9.00}, {n: "Mkanek", p: 6.00}, {n: "Kafta", p: 6.00}, {n: "Kabab", p: 6.00}, {n: "Kabab ع النار", p: 7.00}, {n: "Chicken Grilled", p: 6.00}, {n: "Kafta 3al Ab3a", p: 7.00}, {n: "Kabab 3al Ab3a", p: 7.00}] },
        { cat: "Platters", items: [{n: "Plat Tawook", p: 9.00}, {n: "Plat Lahme", p: 10.00}, {n: "Plat Ghanam", p: 12.00}, {n: "Plat Kafta", p: 9.00}, {n: "Plat Kabab", p: 9.00}, {n: "Plat Kabab ع النار", p: 10.00}, {n: "Plat Wings (14pcs)", p: 8.00}] },
        { cat: "Masheweh (1Kg)", items: [{n: "Mshakal 1Kg", p: 29.00}, {n: "Tawook 1Kg", p: 26.00}, {n: "Lahme 1Kg", p: 32.00}, {n: "Ghanam 1Kg", p: 38.00}, {n: "Kafta 1Kg", p: 26.00}, {n: "Kabab 1Kg", p: 26.00}] },
        { cat: "Masheweh (0.5Kg)", items: [{n: "Mshakal 0.5Kg", p: 15.00}, {n: "Tawook 0.5Kg", p: 14.00}, {n: "Lahme 0.5Kg", p: 17.00}, {n: "Ghanam 0.5Kg", p: 20.00}, {n: "Kafta 0.5Kg", p: 14.00}, {n: "Kabab 0.5Kg", p: 14.00}] },
        { cat: "Chicken", items: [{n: "Farouj (Whole)", p: 16.00}, {n: "Nos Farouj (Half)", p: 9.00}] },
        { cat: "Extra Sauces", items: [{n: "Toum", p: 1.00}, {n: "Honey Mustard", p: 1.50}, {n: "Sauce ع النار", p: 1.50}] },
        { cat: "Drinks", items: [{n: "Soft Drinks", p: 1.10}, {n: "Sparkling Water", p: 1.10}, {n: "Sparkling + Lemon", p: 1.50}, {n: "Water", p: 0.50}, {n: "Beer", p: 2.00}] }
    ];

    let order = {};
    let itemPrices = {};
    let orderType = "Takeaway";
    let itemCounter = 0;

    function renderMenu() {
        const container = document.getElementById('menu-container');
        menuData.forEach(section => {
            const div = document.createElement('div');
            div.className = "animate-item";
            div.innerHTML = `<h2 class="text-xl font-bold text-red-500 border-b border-red-900 pb-2 mb-4 animate-section">${section.cat}</h2>`;
            section.items.forEach(item => {
                order[item.n] = 0;
                itemPrices[item.n] = item.p;
                itemCounter++;
                const delay = (itemCounter * 0.05);
                div.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-gray-800 menu-item-anim" style="animation-delay: ${delay}s">
                        <span class="font-medium">${item.n} <span class="text-gray-500 text-xs">(${item.p}$)</span></span>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty('${item.n}', -1)" class="qty-btn bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700">-</button>
                            <span id="qty-${item.n.replace(/\s+/g, '-')}" class="w-8 text-center font-bold text-yellow-500">0</span>
                            <button onclick="updateQty('${item.n}', 1)" class="qty-btn bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">+</button>
                        </div>
                    </div>`;
            });
            container.appendChild(div);
        });
    }

    function updateQty(name, change) {
        order[name] = Math.max(0, order[name] + change);
        document.getElementById(`qty-${name.replace(/\s+/g, '-')}`).innerText = order[name];
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        for (let name in order) total += order[name] * itemPrices[name];
        document.getElementById('total').innerText = total.toFixed(2);
    }

    function setOrderType(type) {
        orderType = type;
        document.querySelectorAll('.type-btn').forEach(b => {
            b.classList.remove('bg-red-900', 'border-red-600', 'text-white');
            b.classList.add('bg-transparent', 'border-gray-700', 'text-gray-400');
        });
        document.getElementById(`btn-${type}`).classList.add('bg-red-900', 'border-red-600', 'text-white');
    }

    function sendWhatsApp() {
        let msg = `*Order from ع النار*\nType: ${orderType}\n\n`;
        for (let item in order) if (order[item] > 0) msg += `${item}: ${order[item]}\n`;
        msg += `\n*Total: $${document.getElementById('total').innerText}*`;
        msg += `\n\n*Note:* ${document.getElementById('orderComment').value}`;
        window.open(`https://wa.me/96181737470?text=${encodeURIComponent(msg)}`, '_blank');
    }

    renderMenu();
</script>
</body>
</html>
